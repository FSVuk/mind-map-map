<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Region Editor — VANZEMLA</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #111; color: #ddd; font-family: system-ui, sans-serif; display: flex; height: 100vh; overflow: hidden; }

  #sidebar {
    width: 340px; min-width: 340px; background: #1a1a2e; padding: 16px;
    overflow-y: auto; border-right: 1px solid #333; display: flex; flex-direction: column; gap: 12px;
  }
  #sidebar h1 { font-size: 18px; color: #8bb4e0; margin-bottom: 4px; }
  #sidebar p.hint { font-size: 12px; color: #888; line-height: 1.4; }

  .toolbar { display: flex; gap: 6px; flex-wrap: wrap; }
  .toolbar button {
    background: #252545; color: #ddd; border: 1px solid #444; padding: 5px 12px;
    border-radius: 4px; cursor: pointer; font-size: 12px;
  }
  .toolbar button:hover { background: #3a3a5e; }
  .toolbar button.primary { background: #2a6e3a; border-color: #4a8e5a; }
  .toolbar button.primary:hover { background: #3a8e4a; }
  .toolbar button.danger { background: #6e2a2a; border-color: #8e4a4a; }
  .toolbar button.danger:hover { background: #8e3a3a; }

  #region-list { display: flex; flex-direction: column; gap: 2px; margin-top: 8px; }
  .region-item {
    display: flex; align-items: center; gap: 8px; padding: 6px 8px;
    border-radius: 4px; cursor: pointer; font-size: 13px; transition: background 0.15s;
  }
  .region-item:hover { background: #2a2a4e; }
  .region-item.active { background: #2a2a5e; outline: 1px solid #5588cc; }
  .region-item.highlight { background: #2a2a4e; }
  .region-item .swatch {
    width: 18px; height: 18px; border-radius: 3px; border: 1px solid #555; flex-shrink: 0;
  }
  .region-item .rid { font-weight: 600; min-width: 24px; }
  .region-item .subpath-count {
    margin-left: auto; font-size: 11px; padding: 1px 6px; border-radius: 8px;
  }
  .region-item .subpath-count.multi { background: #c04040; color: #fff; font-weight: 600; }
  .region-item .subpath-count.single { background: #333; color: #888; }

  #info-panel {
    background: #1e1e3a; border: 1px solid #444; border-radius: 6px; padding: 12px;
    font-size: 13px; line-height: 1.5; display: none;
  }
  #info-panel h2 { font-size: 15px; color: #8bb4e0; margin-bottom: 6px; }
  .subpath-list { margin-top: 8px; display: flex; flex-direction: column; gap: 4px; }
  .subpath-entry {
    display: flex; align-items: center; gap: 8px; padding: 6px 8px;
    background: #252545; border-radius: 4px; cursor: pointer; font-size: 12px;
  }
  .subpath-entry:hover { background: #303060; }
  .subpath-entry .sp-swatch {
    width: 14px; height: 14px; border-radius: 2px; border: 1px solid #666; flex-shrink: 0;
  }
  .subpath-entry.active { outline: 2px solid #88bbff; background: #353575; }
  .subpath-entry.selected-for-move { outline: 2px solid #ffcc00; background: #454520; }

  .sp-actions {
    margin-left: auto; display: flex; gap: 4px; align-items: center;
  }
  .sp-actions select {
    background: #1a1a2e; color: #ddd; border: 1px solid #555; border-radius: 3px;
    padding: 2px 4px; font-size: 11px; cursor: pointer;
  }
  .sp-actions button {
    background: #3a5a8a; color: #fff; border: 1px solid #5577aa; border-radius: 3px;
    padding: 2px 8px; font-size: 11px; cursor: pointer; white-space: nowrap;
  }
  .sp-actions button:hover { background: #4a6a9a; }
  .sp-actions button.split-btn { background: #2a6e3a; border-color: #4a8e5a; font-weight: 600; }
  .sp-actions button.split-btn:hover { background: #3a8e4a; }
  .sp-actions button.merge-btn { background: #6a5a2a; border-color: #8a7a4a; }
  .sp-actions button.merge-btn:hover { background: #7a6a3a; }

  #map-area { flex: 1; position: relative; overflow: hidden; background: #0a0a1a; }
  #map-area svg { width: 100%; height: 100%; }

  #tooltip {
    position: fixed; pointer-events: none; background: #000d; color: #fff;
    padding: 4px 10px; border-radius: 4px; font-size: 13px; font-weight: 600;
    display: none; z-index: 100;
  }

  #undo-log {
    background: #151530; border: 1px solid #333; border-radius: 4px; padding: 8px;
    font-size: 11px; max-height: 120px; overflow-y: auto; display: none;
  }
  #undo-log h3 { font-size: 12px; color: #999; margin-bottom: 4px; }
  .log-entry { color: #7a7; padding: 1px 0; }
  .log-entry.undo { color: #a77; text-decoration: line-through; }

  #status-bar {
    position: absolute; bottom: 0; left: 0; right: 0; background: #1a1a2eee;
    padding: 6px 16px; font-size: 12px; color: #888; border-top: 1px solid #333;
    display: flex; justify-content: space-between;
  }
  #status-bar .modified { color: #ffaa44; font-weight: 600; }

  /* Floating action for selected subpath */
  #subpath-action-bar {
    position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
    background: #1a1a2ef0; border: 1px solid #555; border-radius: 8px;
    padding: 8px 16px; display: none; z-index: 50; backdrop-filter: blur(8px);
    display: none; gap: 10px; align-items: center; font-size: 13px;
  }
  #subpath-action-bar .action-label { color: #8bb4e0; font-weight: 600; }
  #subpath-action-bar button {
    padding: 5px 14px; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: 600; border: 1px solid;
  }
  #subpath-action-bar .split-action { background: #2a6e3a; border-color: #4a8e5a; color: #fff; }
  #subpath-action-bar .split-action:hover { background: #3a8e4a; }
  #subpath-action-bar .move-action { background: #252545; border-color: #444; color: #ddd; }
  #subpath-action-bar .move-action:hover { background: #3a3a5e; }
  #subpath-action-bar select {
    background: #252545; color: #ddd; border: 1px solid #555; border-radius: 4px;
    padding: 4px 8px; font-size: 12px; cursor: pointer;
  }

  /* Pan hint */
  #pan-hint {
    position: absolute; bottom: 36px; right: 16px; background: #1a1a2ecc;
    border: 1px solid #333; border-radius: 6px; padding: 6px 12px;
    font-size: 11px; color: #666; pointer-events: none; z-index: 40;
  }
  #pan-hint kbd {
    background: #252545; border: 1px solid #444; border-radius: 3px;
    padding: 0 4px; font-size: 10px; color: #999;
  }
</style>
</head>
<body>

<div id="sidebar">
  <h1>Region Editor</h1>
  <p class="hint">
    Click a region on the map or the list below.
    For multi-subpath regions, click individual pieces to <strong style="color:#4a8e5a">split them into new regions</strong>.
  </p>

  <div class="toolbar">
    <button onclick="toggleLabels()" id="btn-labels">Show Labels</button>
    <button onclick="highlightMulti()" id="btn-multi">Show Multi-Subpath</button>
    <button onclick="resetView()" id="btn-reset">Reset View</button>
  </div>
  <div class="toolbar">
    <button onclick="undoAction()" id="btn-undo" disabled>Undo</button>
    <button onclick="exportSVG()" class="primary" id="btn-export">Save SVG</button>
  </div>

  <div id="info-panel">
    <h2 id="info-title"></h2>
    <div id="info-body"></div>
    <div class="subpath-list" id="subpath-list"></div>
    <div style="margin-top:10px;" id="merge-section"></div>
  </div>

  <div id="undo-log">
    <h3>Change History</h3>
    <div id="log-entries"></div>
  </div>

  <div id="region-list"></div>
</div>

<div id="map-area">
  <div id="tooltip"></div>
  <div id="subpath-action-bar">
    <span class="action-label" id="action-label">Subpath 1 of Region 5</span>
    <button class="split-action" id="action-split">⊕ Split to New Region</button>
    <select id="action-move-target"></select>
    <button class="move-action" id="action-move">Move</button>
  </div>
  <div id="pan-hint">
    <kbd>Scroll</kbd> zoom · <kbd>Drag</kbd> pan · <kbd>Click</kbd> select · <kbd>Esc</kbd> reset
  </div>
  <div id="status-bar">
    <span id="status-text">Loading…</span>
    <span id="status-modified"></span>
  </div>
</div>

<script>
const SVG_PATH = '../public/images/map_base.svg';

// ── Maximally-distinct color palette ──────────────────────────
// 50 hand-picked hues spread across the spectrum to minimize confusion
const DISTINCT_COLORS = [
  '#e6194b','#3cb44b','#ffe119','#4363d8','#f58231',
  '#911eb4','#42d4f4','#f032e6','#bfef45','#fabed4',
  '#469990','#dcbeff','#9A6324','#fffac8','#800000',
  '#aaffc3','#808000','#ffd8b1','#000075','#a9a9a9',
  '#e6beff','#1abc9c','#e74c3c','#3498db','#2ecc71',
  '#9b59b6','#f1c40f','#e67e22','#1a5276','#d35400',
  '#7d3c98','#2980b9','#27ae60','#c0392b','#f39c12',
  '#8e44ad','#16a085','#2c3e50','#d4ac0d','#a04000',
  '#1f618d','#117a65','#b03a2e','#6c3483','#1e8449',
  '#d68910','#2e4053','#a93226','#148f77','#b7950b',
];

function regionColor(id) {
  const n = parseInt(id);
  return DISTINCT_COLORS[(n - 1) % DISTINCT_COLORS.length];
}

const SP_COLORS = [
  '#ff6666','#66b3ff','#77dd77','#ffcc66','#cc88ff',
  '#ff88cc','#66ffcc','#ffaa55','#88aaff','#dddd66',
];

let svgEl = null;
let svgText = '';
let regionData = [];
let labelsVisible = false;
let activeRegionId = null;
let activeSubpathIdx = null;
let changeLog = [];
let dirty = false;

// ── Pan & zoom state ────────────────────────────────────────
let currentVB = { x: 0, y: 0, w: 2690, h: 1123 };
let isPanning = false;
let panStart = { x: 0, y: 0 };
let vbStart = { x: 0, y: 0 };
let hasDragged = false;

// ── Init ──────────────────────────────────────────────────────

async function init() {
  const resp = await fetch(SVG_PATH);
  svgText = await resp.text();

  const parser = new DOMParser();
  const doc = parser.parseFromString(svgText, 'image/svg+xml');
  svgEl = doc.querySelector('svg');
  document.getElementById('map-area').insertBefore(svgEl, document.getElementById('subpath-action-bar'));

  // Parse ocean color from the background rect
  const bgRect = svgEl.querySelector('rect');
  if (bgRect) {
    const fill = bgRect.getAttribute('fill');
    if (fill) oceanColor = fill;
  }

  const paths = svgEl.querySelectorAll('path[data-region]');
  paths.forEach(p => {
    const id = p.getAttribute('data-region');
    const d = p.getAttribute('d');
    const subpaths = splitSubpaths(d);
    regionData.push({ id, subpaths });
  });

  regionData.sort((a, b) => parseInt(a.id) - parseInt(b.id));

  // Read original viewBox
  const vb = svgEl.getAttribute('viewBox');
  if (vb) {
    const parts = vb.split(/\s+/).map(Number);
    currentVB = { x: parts[0], y: parts[1], w: parts[2], h: parts[3] };
  }

  setupPanZoom();
  renderMap();
  buildRegionList();
  setStatus(`Loaded ${regionData.length} regions — scroll to zoom, drag to pan`);
}

function splitSubpaths(d) {
  const re = /M\s/g;
  let match;
  const starts = [];
  while ((match = re.exec(d)) !== null) {
    starts.push(match.index);
  }
  if (starts.length <= 1) return [d];
  const parts = [];
  for (let i = 0; i < starts.length; i++) {
    const end = i + 1 < starts.length ? starts[i + 1] : d.length;
    parts.push(d.slice(starts[i], end).trim());
  }
  return parts;
}

// ── Pan & zoom ────────────────────────────────────────────────

function setupPanZoom() {
  const mapArea = document.getElementById('map-area');

  mapArea.addEventListener('wheel', (e) => {
    e.preventDefault();
    const factor = e.deltaY < 0 ? 0.85 : 1.18;
    const rect = svgEl.getBoundingClientRect();

    // Mouse position in SVG coordinates
    const mx = currentVB.x + ((e.clientX - rect.left) / rect.width) * currentVB.w;
    const my = currentVB.y + ((e.clientY - rect.top) / rect.height) * currentVB.h;

    const nw = Math.max(200, Math.min(5000, currentVB.w * factor));
    const nh = Math.max(100, Math.min(2500, currentVB.h * factor));

    currentVB = {
      x: mx - nw * ((mx - currentVB.x) / currentVB.w),
      y: my - nh * ((my - currentVB.y) / currentVB.h),
      w: nw,
      h: nh,
    };
    applyViewBox();
  }, { passive: false });

  mapArea.addEventListener('mousedown', (e) => {
    if (e.button !== 0) return;
    isPanning = true;
    hasDragged = false;
    panStart = { x: e.clientX, y: e.clientY };
    vbStart = { x: currentVB.x, y: currentVB.y };
    svgEl.style.cursor = 'grabbing';
  });

  window.addEventListener('mousemove', (e) => {
    if (!isPanning) return;
    const dx = e.clientX - panStart.x;
    const dy = e.clientY - panStart.y;
    if (Math.abs(dx) > 3 || Math.abs(dy) > 3) hasDragged = true;
    const rect = svgEl.getBoundingClientRect();
    currentVB.x = vbStart.x - (dx / rect.width) * currentVB.w;
    currentVB.y = vbStart.y - (dy / rect.height) * currentVB.h;
    applyViewBox();
  });

  window.addEventListener('mouseup', () => {
    isPanning = false;
    if (svgEl) svgEl.style.cursor = 'grab';
  });

  svgEl.style.cursor = 'grab';
}

function applyViewBox() {
  svgEl.setAttribute('viewBox', `${currentVB.x} ${currentVB.y} ${currentVB.w} ${currentVB.h}`);
}

function animateToViewBox(target, duration = 350) {
  const start = { ...currentVB };
  const startTime = performance.now();
  const ease = t => t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;

  function animate(now) {
    const t = Math.min(1, (now - startTime) / duration);
    const e = ease(t);
    currentVB = {
      x: start.x + (target.x - start.x) * e,
      y: start.y + (target.y - start.y) * e,
      w: start.w + (target.w - start.w) * e,
      h: start.h + (target.h - start.h) * e,
    };
    applyViewBox();
    if (t < 1) requestAnimationFrame(animate);
  }
  requestAnimationFrame(animate);
}

// ── Render map from data model ────────────────────────────────

function renderMap() {
  const regionsGroup = svgEl.querySelector('#regions');
  if (regionsGroup) {
    regionsGroup.querySelectorAll('path[data-region]').forEach(p => p.remove());

    regionData.forEach(rd => {
      const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      path.setAttribute('data-region', rd.id);
      path.setAttribute('d', rd.subpaths.join(' '));
      path.setAttribute('fill', regionColor(rd.id));
      path.setAttribute('fill-rule', 'evenodd');
      path.style.cursor = 'pointer';

      path.addEventListener('mouseenter', (e) => {
        showTooltip(e, rd.id, rd.subpaths.length);
        highlightSidebarItem(rd.id, true);
      });
      path.addEventListener('mousemove', (e) => moveTooltip(e));
      path.addEventListener('mouseleave', () => {
        hideTooltip();
        highlightSidebarItem(rd.id, false);
      });
      path.addEventListener('click', (e) => {
        e.stopPropagation();
        if (!hasDragged) selectRegion(rd.id);
      });

      regionsGroup.appendChild(path);
    });
  }

  clearLabels();
  clearSubpathOverlays();
  hideActionBar();
  if (labelsVisible) showLabels();
}

// ── Sidebar highlight on hover ────────────────────────────────

function highlightSidebarItem(id, on) {
  const item = document.querySelector(`.region-item[data-region-id="${id}"]`);
  if (item && !item.classList.contains('active')) {
    item.classList.toggle('highlight', on);
    if (on) item.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
  }
}

// ── Region list ───────────────────────────────────────────────

function buildRegionList() {
  const list = document.getElementById('region-list');
  list.innerHTML = '';

  regionData.forEach(rd => {
    const div = document.createElement('div');
    div.className = 'region-item';
    div.dataset.regionId = rd.id;
    if (rd.id === activeRegionId) div.classList.add('active');

    const multi = rd.subpaths.length > 1;
    div.innerHTML = `
      <div class="swatch" style="background:${regionColor(rd.id)}"></div>
      <span class="rid">${rd.id}</span>
      <span class="subpath-count ${multi ? 'multi' : 'single'}">
        ${rd.subpaths.length} subpath${rd.subpaths.length !== 1 ? 's' : ''}
      </span>
    `;

    // Hover highlights the map region
    div.addEventListener('mouseenter', () => {
      const pathEl = svgEl.querySelector(`path[data-region="${rd.id}"]`);
      if (pathEl && rd.id !== activeRegionId) {
        pathEl.style.filter = 'brightness(1.4) drop-shadow(0 0 6px #fff8)';
      }
    });
    div.addEventListener('mouseleave', () => {
      const pathEl = svgEl.querySelector(`path[data-region="${rd.id}"]`);
      if (pathEl && rd.id !== activeRegionId) {
        pathEl.style.filter = activeRegionId ? '' : '';
        pathEl.style.opacity = activeRegionId ? '0.25' : '1';
      }
    });

    div.addEventListener('click', () => selectRegion(rd.id));
    list.appendChild(div);
  });
}

// ── Select & inspect region ───────────────────────────────────

function selectRegion(id) {
  activeRegionId = id;
  activeSubpathIdx = null;

  document.querySelectorAll('.region-item').forEach(el => {
    el.classList.toggle('active', el.dataset.regionId === id);
    el.classList.remove('highlight');
  });

  // Scroll sidebar to active item
  const activeItem = document.querySelector(`.region-item[data-region-id="${id}"]`);
  if (activeItem) activeItem.scrollIntoView({ block: 'nearest', behavior: 'smooth' });

  // Dim other regions, highlight selected
  svgEl.querySelectorAll('path[data-region]').forEach(p => {
    if (p.getAttribute('data-region') === id) {
      p.style.filter = 'brightness(1.3) drop-shadow(0 0 6px #fff8)';
      p.style.opacity = '1';
    } else {
      p.style.filter = '';
      p.style.opacity = '0.25';
    }
  });

  const rd = regionData.find(r => r.id === id);
  const panel = document.getElementById('info-panel');
  panel.style.display = 'block';
  document.getElementById('info-title').textContent = `Region ${id} — ${rd.subpaths.length} subpath${rd.subpaths.length !== 1 ? 's' : ''}`;

  const multi = rd.subpaths.length > 1;
  document.getElementById('info-body').innerHTML = multi
    ? `<span style="color:#f66;font-weight:600;">Multiple disconnected areas!</span><br>
       Click a colored subpath on the map, then use <strong style="color:#4a8e5a">⊕ Split</strong> to make it its own region.`
    : `Single contiguous path.`;

  // Build subpath entries
  const spList = document.getElementById('subpath-list');
  spList.innerHTML = '';

  rd.subpaths.forEach((sp, idx) => {
    const entry = document.createElement('div');
    entry.className = 'subpath-entry';
    entry.dataset.spIdx = idx;

    entry.innerHTML = `
      <div class="sp-swatch" style="background:${SP_COLORS[idx % SP_COLORS.length]}"></div>
      <span>Subpath ${idx + 1}</span>
      <div class="sp-actions">
        <button class="split-btn" title="Split this subpath into its own new region" onclick="event.stopPropagation(); splitSubpath('${id}', ${idx});">⊕ Split</button>
      </div>
    `;
    entry.addEventListener('click', (e) => {
      if (e.target.tagName === 'BUTTON') return;
      isolateSubpath(id, idx);
    });
    spList.appendChild(entry);
  });

  // Merge section
  const mergeSection = document.getElementById('merge-section');
  let mergeOptions = `<option value="" disabled selected>Merge all into...</option>`;
  regionData.forEach(r => {
    if (r.id !== id) {
      mergeOptions += `<option value="${r.id}">Region ${r.id}</option>`;
    }
  });
  mergeSection.innerHTML = `
    <div style="display:flex;gap:6px;align-items:center;">
      <select id="merge-target" style="background:#1a1a2e;color:#ddd;border:1px solid #555;border-radius:3px;padding:3px 6px;font-size:12px;flex:1;">
        ${mergeOptions}
      </select>
      <button onclick="mergeRegion('${id}')" class="merge-btn" style="background:#6a5a2a;color:#fff;border:1px solid #8a7a4a;border-radius:3px;padding:3px 10px;font-size:12px;cursor:pointer;">
        Merge
      </button>
    </div>
    <div style="font-size:11px;color:#888;margin-top:4px;">Moves ALL subpaths from region ${id} into the target, then removes region ${id}.</div>
  `;

  if (multi) {
    showSubpathOverlays(rd);
  } else {
    clearSubpathOverlays();
    hideActionBar();
  }

  // Smooth-zoom to region
  const pathEl = svgEl.querySelector(`path[data-region="${id}"]`);
  if (pathEl) zoomToRegion(pathEl);
}

function getNextRegionId() {
  const ids = regionData.map(r => parseInt(r.id));
  return String(Math.max(...ids) + 1);
}

// ── Split subpath to new region (one-click) ───────────────────

function splitSubpath(fromId, subpathIdx) {
  const newId = getNextRegionId();
  moveSubpath(fromId, subpathIdx, '__new__');
}

// ── Move subpath to different region ──────────────────────────

function moveSubpath(fromId, subpathIdx, toId) {
  const fromRd = regionData.find(r => r.id === fromId);
  if (!fromRd || subpathIdx >= fromRd.subpaths.length) return;
  if (fromRd.subpaths.length <= 1 && toId !== '__new__') {
    if (!confirm(`This will remove region ${fromId} entirely (moving its only subpath). Continue?`)) return;
  }

  saveUndo(`Move subpath ${subpathIdx + 1} from region ${fromId} to ${toId === '__new__' ? 'new region' : 'region ' + toId}`);

  const subpath = fromRd.subpaths.splice(subpathIdx, 1)[0];

  let targetId = toId;
  if (toId === '__new__') {
    targetId = getNextRegionId();
    regionData.push({ id: targetId, subpaths: [subpath] });
    regionData.sort((a, b) => parseInt(a.id) - parseInt(b.id));
  } else {
    const toRd = regionData.find(r => r.id === toId);
    if (toRd) toRd.subpaths.push(subpath);
  }

  // Remove empty regions
  const idx = regionData.findIndex(r => r.id === fromId);
  if (idx !== -1 && regionData[idx].subpaths.length === 0) {
    regionData.splice(idx, 1);
  }

  markDirty();
  renderMap();
  buildRegionList();
  setStatus(`Moved subpath → region ${targetId}`);

  selectRegion(targetId);
}

// ── Merge entire region into another ──────────────────────────

function mergeRegion(fromId) {
  const select = document.getElementById('merge-target');
  const toId = select.value;
  if (!toId) { alert('Select a target region first.'); return; }

  const fromRd = regionData.find(r => r.id === fromId);
  const toRd = regionData.find(r => r.id === toId);
  if (!fromRd || !toRd) return;

  saveUndo(`Merge region ${fromId} (${fromRd.subpaths.length} subpaths) into region ${toId}`);

  toRd.subpaths.push(...fromRd.subpaths);
  const idx = regionData.findIndex(r => r.id === fromId);
  if (idx !== -1) regionData.splice(idx, 1);

  markDirty();
  renderMap();
  buildRegionList();
  setStatus(`Merged region ${fromId} into region ${toId}`);
  selectRegion(toId);
}

// ── Subpath overlays ──────────────────────────────────────────

let overlayGroup = null;

function showSubpathOverlays(rd) {
  clearSubpathOverlays();
  overlayGroup = document.createElementNS('http://www.w3.org/2000/svg', 'g');
  overlayGroup.id = 'subpath-overlays';

  rd.subpaths.forEach((sp, idx) => {
    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('d', sp);
    path.setAttribute('fill', SP_COLORS[idx % SP_COLORS.length]);
    path.setAttribute('fill-rule', 'evenodd');
    path.setAttribute('stroke', '#fff');
    path.setAttribute('stroke-width', '2');
    path.setAttribute('opacity', '0.8');
    path.style.cursor = 'pointer';
    path.addEventListener('click', (e) => { e.stopPropagation(); isolateSubpath(rd.id, idx); });
    overlayGroup.appendChild(path);
  });

  // Hide original
  const origPath = svgEl.querySelector(`path[data-region="${rd.id}"]`);
  if (origPath) origPath.style.opacity = '0';

  svgEl.appendChild(overlayGroup);
}

function clearSubpathOverlays() {
  if (overlayGroup) { overlayGroup.remove(); overlayGroup = null; }
}

function isolateSubpath(regionId, idx) {
  activeSubpathIdx = idx;
  if (!overlayGroup) return;

  overlayGroup.querySelectorAll('path').forEach((p, i) => {
    if (i === idx) {
      p.setAttribute('opacity', '1');
      p.setAttribute('stroke', '#ffff00');
      p.setAttribute('stroke-width', '3');
    } else {
      p.setAttribute('opacity', '0.15');
      p.setAttribute('stroke', '#fff');
      p.setAttribute('stroke-width', '1');
    }
  });

  document.querySelectorAll('.subpath-entry').forEach((el, i) => {
    el.classList.toggle('active', i === idx);
  });

  // Show floating action bar
  showActionBar(regionId, idx);

  // Zoom to subpath
  const rd = regionData.find(r => r.id === regionId);
  if (!rd) return;
  const tempPath = document.createElementNS('http://www.w3.org/2000/svg', 'path');
  tempPath.setAttribute('d', rd.subpaths[idx]);
  svgEl.appendChild(tempPath);
  zoomToRegion(tempPath);
  tempPath.remove();
}

// ── Floating action bar ──────────────────────────────────────

function showActionBar(regionId, subpathIdx) {
  const bar = document.getElementById('subpath-action-bar');
  const rd = regionData.find(r => r.id === regionId);
  if (!rd) return;

  document.getElementById('action-label').textContent =
    `Subpath ${subpathIdx + 1} of Region ${regionId}`;

  // Split button
  document.getElementById('action-split').onclick = () => splitSubpath(regionId, subpathIdx);

  // Move dropdown
  const select = document.getElementById('action-move-target');
  let options = `<option value="" disabled selected>Move to…</option>`;
  regionData.forEach(r => {
    if (r.id !== regionId) options += `<option value="${r.id}">Region ${r.id}</option>`;
  });
  select.innerHTML = options;

  document.getElementById('action-move').onclick = () => {
    const toId = select.value;
    if (!toId) { alert('Pick a target region from the dropdown.'); return; }
    moveSubpath(regionId, subpathIdx, toId);
  };

  bar.style.display = 'flex';
}

function hideActionBar() {
  document.getElementById('subpath-action-bar').style.display = 'none';
}

// ── Zoom ──────────────────────────────────────────────────────

function zoomToRegion(pathEl) {
  const bbox = pathEl.getBBox();
  const pad = Math.max(bbox.width, bbox.height) * 0.25;

  const svgRect = svgEl.getBoundingClientRect();
  const aspect = svgRect.width / svgRect.height;

  let tw = bbox.width + pad * 2;
  let th = bbox.height + pad * 2;
  if (tw / th > aspect) th = tw / aspect;
  else tw = th * aspect;

  animateToViewBox({
    x: bbox.x + bbox.width / 2 - tw / 2,
    y: bbox.y + bbox.height / 2 - th / 2,
    w: tw,
    h: th,
  });
}

// ── Undo ──────────────────────────────────────────────────────

function saveUndo(description) {
  changeLog.push({
    description,
    snapshot: JSON.parse(JSON.stringify(regionData)),
  });
  document.getElementById('btn-undo').disabled = false;
  updateUndoLog();
}

function undoAction() {
  if (changeLog.length === 0) return;
  const entry = changeLog.pop();
  regionData.length = 0;
  regionData.push(...entry.snapshot);
  dirty = changeLog.length > 0;

  renderMap();
  buildRegionList();
  updateDirtyIndicator();
  setStatus(`Undone: ${entry.description}`);

  if (activeRegionId && regionData.find(r => r.id === activeRegionId)) {
    selectRegion(activeRegionId);
  } else {
    document.getElementById('info-panel').style.display = 'none';
    activeRegionId = null;
  }

  document.getElementById('btn-undo').disabled = changeLog.length === 0;
  updateUndoLog();
}

function updateUndoLog() {
  const logEl = document.getElementById('undo-log');
  const entries = document.getElementById('log-entries');
  if (changeLog.length === 0) { logEl.style.display = 'none'; return; }
  logEl.style.display = 'block';
  entries.innerHTML = changeLog.map((e, i) =>
    `<div class="log-entry">${i + 1}. ${e.description}</div>`
  ).join('');
}

// ── Export ─────────────────────────────────────────────────────

function exportSVG() {
  const parser = new DOMParser();
  const doc = parser.parseFromString(svgText, 'image/svg+xml');
  const svg = doc.querySelector('svg');
  const regGroup = svg.querySelector('#regions');

  regGroup.querySelectorAll('path[data-region]').forEach(p => p.remove());

  regionData.forEach(rd => {
    const path = doc.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('d', rd.subpaths.join(' '));
    path.setAttribute('fill', '#F0EDE8');
    path.setAttribute('data-region', rd.id);
    path.setAttribute('fill-rule', 'evenodd');
    regGroup.appendChild(path);
  });

  const serializer = new XMLSerializer();
  let output = serializer.serializeToString(svg);
  output = '<?xml version="1.0" encoding="UTF-8"?>\n' + output;

  const blob = new Blob([output], { type: 'image/svg+xml' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'map_base.svg';
  a.click();
  URL.revokeObjectURL(url);

  setStatus('SVG downloaded! Replace public/images/map_base.svg with it, then re-run extract-regions.js');
  dirty = false;
  updateDirtyIndicator();
}

// ── Labels ────────────────────────────────────────────────────

let labelGroup = null;

function toggleLabels() {
  labelsVisible = !labelsVisible;
  document.getElementById('btn-labels').textContent = labelsVisible ? 'Hide Labels' : 'Show Labels';
  if (labelsVisible) showLabels(); else clearLabels();
}

function showLabels() {
  clearLabels();
  labelGroup = document.createElementNS('http://www.w3.org/2000/svg', 'g');
  labelGroup.id = 'region-labels';

  svgEl.querySelectorAll('path[data-region]').forEach(p => {
    const id = p.getAttribute('data-region');
    const bbox = p.getBBox();
    const cx = bbox.x + bbox.width / 2;
    const cy = bbox.y + bbox.height / 2;
    const fontSize = Math.max(8, Math.min(20, Math.min(bbox.width, bbox.height) * 0.3));

    const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    text.setAttribute('x', cx);
    text.setAttribute('y', cy);
    text.setAttribute('text-anchor', 'middle');
    text.setAttribute('dominant-baseline', 'central');
    text.setAttribute('fill', '#000');
    text.setAttribute('font-size', fontSize);
    text.setAttribute('font-weight', '700');
    text.setAttribute('stroke', '#fff');
    text.setAttribute('stroke-width', fontSize * 0.15);
    text.setAttribute('paint-order', 'stroke');
    text.style.pointerEvents = 'none';
    text.textContent = id;
    labelGroup.appendChild(text);
  });

  svgEl.appendChild(labelGroup);
}

function clearLabels() {
  if (labelGroup) { labelGroup.remove(); labelGroup = null; }
}

// ── View controls ─────────────────────────────────────────────

function resetView() {
  activeRegionId = null;
  activeSubpathIdx = null;
  clearSubpathOverlays();
  hideActionBar();
  animateToViewBox({ x: 0, y: 0, w: 2690, h: 1123 });
  svgEl.querySelectorAll('path[data-region]').forEach(p => {
    p.style.filter = '';
    p.style.opacity = '1';
  });
  document.querySelectorAll('.region-item').forEach(el => {
    el.classList.remove('active');
    el.classList.remove('highlight');
  });
  document.getElementById('info-panel').style.display = 'none';
  document.getElementById('merge-section').innerHTML = '';
}

function highlightMulti() {
  resetView();
  svgEl.querySelectorAll('path[data-region]').forEach(p => {
    const id = p.getAttribute('data-region');
    const rd = regionData.find(r => r.id === id);
    if (rd && rd.subpaths.length > 1) {
      p.style.filter = 'brightness(1.5) drop-shadow(0 0 8px #ff0)';
      p.setAttribute('fill', '#ff4444');
    } else {
      p.style.opacity = '0.3';
    }
  });
  setStatus(`Showing ${regionData.filter(r => r.subpaths.length > 1).length} multi-subpath regions`);
}

// ── Status & dirty ────────────────────────────────────────────

function markDirty() {
  dirty = true;
  updateDirtyIndicator();
}

function updateDirtyIndicator() {
  document.getElementById('status-modified').innerHTML = dirty
    ? '<span class="modified">Modified — Save SVG to export</span>'
    : '';
}

function setStatus(text) {
  document.getElementById('status-text').textContent = text;
}

// ── Tooltip ───────────────────────────────────────────────────

const tooltip = document.getElementById('tooltip');

function showTooltip(e, id, subpathCount) {
  tooltip.style.display = 'block';
  tooltip.innerHTML = `Region ${id}` + (subpathCount > 1
    ? ` <span style="color:#ff6666">(${subpathCount} subpaths)</span>` : '');
  moveTooltip(e);
}
function moveTooltip(e) {
  tooltip.style.left = (e.clientX + 14) + 'px';
  tooltip.style.top = (e.clientY - 10) + 'px';
}
function hideTooltip() { tooltip.style.display = 'none'; }

// ── Keyboard shortcuts ────────────────────────────────────────

window.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') resetView();
  if ((e.ctrlKey || e.metaKey) && e.key === 'z') { e.preventDefault(); undoAction(); }
});

window.addEventListener('beforeunload', (e) => {
  if (dirty) { e.preventDefault(); e.returnValue = ''; }
});

init();
</script>
